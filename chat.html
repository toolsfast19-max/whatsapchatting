<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>а§Ъа•Иа§Я - а§Ѓа•За§∞а•А а§Ъа•Иа§Я</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <span>рЯС•</span>
                <h3>а§Ча•На§∞а•Ба§™ а§Ъа•Иа§Я</h3>
            </div>
            <button id="logoutBtn" class="logout-btn">рЯЪ™ а§ђа§Ња§єа§∞ а§®а§ња§Ха§≤а•За§В</button>
        </div>
        
        <div class="online-users">
            <span>рЯЯҐ а§Са§®а§≤а§Ња§За§®: <span id="onlineCount">0</span> а§≤а•Ла§Ч</span>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="welcome-msg">
                рЯСЛ а§µа•За§≤а§Ха§Ѓ! а§ѓа§єа§Ња§Б а§Еа§™а§®а•З а§¶а•Ла§Єа•На§§а•Ла§В а§Єа•З а§ђа§Ња§§ а§Ха§∞а•За§В<br>
                рЯУЈ а§Ђа•Ла§Яа•Л а§≠а•За§Ь а§Єа§Ха§§а•З а§єа•Иа§В | рЯШК а§За§Ѓа•Ла§Ьа•А а§≠а•А а§єа•И
            </div>
        </div>
        
        <div class="input-area">
            <button id="emojiBtn" class="emoji-btn" title="а§За§Ѓа•Ла§Ьа•А">рЯШК</button>
            <input type="text" id="messageInput" placeholder="а§Яа§Ња§За§™ а§Ха§∞а•За§В..." autocomplete="off">
            <button id="imageBtn" class="image-btn" title="а§Ђа•Ла§Яа•Л а§≠а•За§Ьа•За§В">рЯУЈ</button>
            <button id="sendBtn" class="send-btn" title="а§≠а•За§Ьа•За§В">вЮ§</button>
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        
        // а§Жа§™а§Ха§Њ Firebase Config (а§Жа§™а§®а•З а§¶а§ња§ѓа§Њ а§єа•Ба§Ж)
        const firebaseConfig = {
            apiKey: "AIzaSyCml0iKyB9IP_8hlRICNL5oul_REv6JZOc",
            authDomain: "whatsappchattingapp-2031b.firebaseapp.com",
            databaseURL: "https://whatsappchattingapp-2031b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "whatsappchattingapp-2031b",
            storageBucket: "whatsappchattingapp-2031b.firebasestorage.app",
            messagingSenderId: "588426238074",
            appId: "1:588426238074:web:9d20c5e269ec9cef7ec3c3"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        
        const userName = localStorage.getItem('userName');
        const userPhone = localStorage.getItem('userPhone');
        
        if(!userName || !userPhone) {
            window.location.href = 'index.html';
        }
        
        // а§Са§®а§≤а§Ња§За§® а§Єа•На§Яа•За§Яа§Є а§Єа•За§Я а§Ха§∞а•За§В
        const userStatusRef = ref(db, 'users/' + userPhone);
        const connectedRef = ref(db, '.info/connected');
        
        onValue(connectedRef, (snap) => {
            if(snap.val() === true) {
                update(userStatusRef, { 
                    online: true, 
                    lastSeen: new Date().toISOString() 
                });
                
                // а§Ьа§ђ а§Ра§™ а§ђа§Ва§¶ а§єа•Л а§§а•Л а§Са§Ђа§≤а§Ња§За§® а§Ха§∞а•За§В
                window.addEventListener('beforeunload', () => {
                    update(userStatusRef, { online: false });
                });
            }
        });
        
        // а§Са§®а§≤а§Ња§За§® а§ѓа•Ва§Ьа§∞а•На§Є а§Ха•А а§Єа§Ва§Ца•На§ѓа§Њ а§¶а§ња§Ца§Ња§Па§В
        const usersRef = ref(db, 'users');
        onValue(usersRef, (snapshot) => {
            let online = 0;
            let onlineNames = [];
            snapshot.forEach((child) => {
                if(child.val().online === true) {
                    online++;
                    onlineNames.push(child.val().name);
                }
            });
            document.getElementById('onlineCount').innerHTML = online;
            if(onlineNames.length > 0) {
                document.querySelector('.online-users span').innerHTML = `рЯЯҐ а§Са§®а§≤а§Ња§За§®: ${online} а§≤а•Ла§Ч (${onlineNames.join(', ')})`;
            } else {
                document.querySelector('.online-users span').innerHTML = `рЯЯҐ а§Са§®а§≤а§Ња§За§®: 0 а§≤а•Ла§Ч`;
            }
        });
        
        // а§Ѓа•Иа§Єа•За§Ь а§≠а•За§Ьа§®а•З а§Ха§Њ а§Ђа§Ва§Ха•На§ґа§®
        const messagesRef = ref(db, 'messages');
        
        function sendMessage(text, isImage = false, imageUrl = '') {
            if(!text && !isImage) return;
            
            const message = {
                text: text || (isImage ? 'рЯУЈ а§Ђа•Ла§Яа•Л' : ''),
                sender: userName,
                senderPhone: userPhone,
                timestamp: new Date().toISOString(),
                type: isImage ? 'image' : 'text'
            };
            
            if(isImage) message.imageUrl = imageUrl;
            
            push(messagesRef, message).then(() => {
                // а§Єа•На§Ха•На§∞а•Йа§≤ а§Ха§∞а•За§В
                setTimeout(() => {
                    const msgs = document.getElementById('messagesArea');
                    msgs.scrollTop = msgs.scrollHeight;
                }, 100);
            });
        }
        
        // а§Єа•За§Ва§° а§ђа§Яа§®
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('messageInput');
            if(input.value.trim()) {
                sendMessage(input.value.trim());
                input.value = '';
                input.focus();
            }
        });
        
        // а§Па§Ва§Яа§∞ а§Ха•А
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
        });
        
        // а§За§Ѓа•За§Ь а§≠а•За§Ьа§®а§Њ
        document.getElementById('imageBtn').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });
        
        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(file && file.type.startsWith('image/')) {
                if(file.size > 5 * 1024 * 1024) {
                    alert("вЭМ а§Ђа•Ла§Яа•Л 5MB а§Єа•З а§Ыа•Ла§Яа•А а§єа•Ла§®а•А а§Ъа§Ња§єа§ња§П!");
                    return;
                }
                
                const loadingMsg = document.createElement('div');
                loadingMsg.className = 'message message-sent';
                loadingMsg.innerHTML = '<div class="message-sender">' + userName + '</div><div class="message-text">вП≥ а§Ђа•Ла§Яа•Л а§Еа§™а§≤а•Ла§° а§єа•Л а§∞а§єа•А а§єа•И...</div>';
                document.getElementById('messagesArea').appendChild(loadingMsg);
                
                const imageRef = storageRef(storage, 'images/' + Date.now() + '_' + file.name);
                await uploadBytes(imageRef, file);
                const url = await getDownloadURL(imageRef);
                
                loadingMsg.remove();
                sendMessage('', true, url);
            } else {
                alert("вЭМ а§Ха•Га§™а§ѓа§Њ а§Па§Х а§За§Ѓа•За§Ь а§Ђа§Ња§За§≤ а§Ъа•Ба§®а•За§В!");
            }
            e.target.value = '';
        });
        
        // а§За§Ѓа•Ла§Ьа•А а§™а§ња§Ха§∞
        const emojis = ['рЯША','рЯШГ','рЯШД','рЯШБ','рЯШЖ','рЯШЕ','рЯШВ','рЯ§£','рЯШК','рЯШЗ','рЯЩВ','рЯЩГ','рЯШЙ','рЯШМ','рЯШН','рЯ•∞','рЯШШ','рЯШЧ','рЯШЩ','рЯШЪ','рЯШЛ','рЯШЫ','рЯШЭ','рЯШЬ','рЯ§™','рЯ§®','рЯІР','рЯ§У','рЯШО','рЯ•Є','рЯ§©','рЯ•≥','рЯШП','рЯШТ','рЯШЮ','рЯШФ','рЯШЯ','рЯШХ','рЯЩБ','вШєпЄП','рЯШ£','рЯШЦ','рЯШЂ','рЯШ©','рЯ•Ї','рЯШҐ','рЯШ≠','рЯШ§','рЯШ†','рЯШ°','рЯ§ђ','рЯ§ѓ','рЯШ≥','рЯ•µ','рЯ•ґ','рЯШ±','рЯШ®','рЯШ∞','рЯШ•','рЯШУ','рЯ§Ч','рЯ§Ф','рЯ§≠','рЯ§Ђ','рЯ§•','рЯШґ','рЯШР','рЯШС','рЯШђ','рЯЩД','рЯШѓ','рЯШ¶','рЯШІ','рЯШЃ','рЯШ≤','рЯ•±','рЯШі','рЯ§§','рЯШ™','рЯШµ','рЯ§Р','рЯ•і','рЯ§Ґ','рЯ§Ѓ','рЯ§І','рЯШЈ','рЯ§Т','рЯ§Х','рЯ§С','рЯ§†','рЯШИ','рЯСњ','рЯСє','рЯСЇ','рЯ§°','рЯТ©','рЯСї','рЯТА','рЯСљ','рЯ§Ц','рЯОГ','рЯШЇ','рЯШЄ','рЯШє','рЯШї','рЯШЉ','рЯШљ','рЯЩА','рЯШњ','рЯШЊ','вЭ§пЄП','рЯІ°','рЯТЫ','рЯТЪ','рЯТЩ','рЯТЬ','рЯЦ§','рЯ§Н','рЯ§О','рЯТФ','вЭ£пЄП','рЯТХ','рЯТЮ','рЯТУ','рЯТЧ','рЯТЦ','рЯТШ','рЯТЭ','рЯОЙ','вЬ®','в≠Р','рЯМЯ','рЯТ•','рЯФ•','рЯТѓ'];
        
        let emojiPickerOpen = false;
        
        document.getElementById('emojiBtn').addEventListener('click', () => {
            if(emojiPickerOpen) {
                const picker = document.getElementById('emojiPicker');
                if(picker) picker.remove();
                emojiPickerOpen = false;
                return;
            }
            
            const picker = document.createElement('div');
            picker.id = 'emojiPicker';
            picker.style.cssText = 'position:fixed;bottom:80px;left:10px;background:#2d2d2d;border:1px solid #075e54;border-radius:15px;padding:12px;width:280px;max-height:250px;overflow-y:auto;display:grid;grid-template-columns:repeat(8,1fr);gap:6px;z-index:1000;box-shadow:0 4px 15px rgba(0,0,0,0.3);';
            
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.style.cssText = 'font-size:26px;border:none;background:transparent;cursor:pointer;padding:6px;border-radius:8px;transition:all 0.2s;';
                btn.onmouseenter = () => btn.style.background = '#075e54';
                btn.onmouseleave = () => btn.style.background = 'transparent';
                btn.onclick = () => {
                    const input = document.getElementById('messageInput');
                    input.value += emoji;
                    input.focus();
                    picker.remove();
                    emojiPickerOpen = false;
                };
                picker.appendChild(btn);
            });
            
            document.body.appendChild(picker);
            emojiPickerOpen = true;
            
            // а§ђа§Ња§єа§∞ а§Ха•На§≤а§ња§Х а§Ха§∞а§®а•З а§™а§∞ а§ђа§Ва§¶
            setTimeout(() => {
                document.addEventListener('click', function closePicker(e) {
                    if(!picker.contains(e.target) && e.target !== document.getElementById('emojiBtn')) {
                        picker.remove();
                        emojiPickerOpen = false;
                        document.removeEventListener('click', closePicker);
                    }
                });
            }, 10);
        });
        
        // а§Ѓа•Иа§Єа•За§Ь а§∞а§ња§Єа•Аа§µ а§Ха§∞а§®а§Њ а§Фа§∞ а§¶а§ња§Ца§Ња§®а§Њ
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const messagesDiv = document.getElementById('messagesArea');
            const isMe = msg.senderPhone === userPhone;
            
            // а§µа•За§≤а§Ха§Ѓ а§Ѓа•Иа§Єа•За§Ь а§єа§Яа§Ња§Па§В а§Еа§Ча§∞ а§™а§єа§≤а§Њ а§Ѓа•Иа§Єа•За§Ь а§Жа§ѓа§Њ
            const welcome = messagesDiv.querySelector('.welcome-msg');
            if(welcome && messagesDiv.children.length > 1) {
                welcome.remove();
            }
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'message-sent' : 'message-received'}`;
            
            const time = new Date(msg.timestamp).toLocaleTimeString('hi-IN', {hour:'2-digit', minute:'2-digit'});
            
            if(msg.type === 'image') {
                msgDiv.innerHTML = `
                    <div class="message-sender">${escapeHtml(msg.sender)}</div>
                    <img src="${msg.imageUrl}" class="message-image" onclick="window.open(this.src)" alt="а§Ђа•Ла§Яа•Л" style="max-width:200px;max-height:200px;border-radius:12px;cursor:pointer;margin-top:5px;">
                    <div class="message-time">${time}</div>
                `;
            } else {
                msgDiv.innerHTML = `
                    <div class="message-sender">${escapeHtml(msg.sender)}</div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${time}</div>
                `;
            }
            
            messagesDiv.appendChild(msgDiv);
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // а§≤а•Йа§Ча§Жа§Йа§Я
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await update(userStatusRef, { online: false });
            localStorage.clear();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
