<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>а§Ъа•Иа§Я - а§Ѓа•За§∞а•А а§Ъа•Иа§Я</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <span>рЯС•</span>
                <h3>а§Ча•На§∞а•Ба§™ а§Ъа•Иа§Я</h3>
            </div>
            <button id="logoutBtn" class="logout-btn">рЯЪ™ а§ђа§Ња§єа§∞ а§®а§ња§Ха§≤а•За§В</button>
        </div>
        
        <div class="online-users">
            <span>рЯЯҐ а§Са§®а§≤а§Ња§За§®: <span id="onlineCount">0</span> а§≤а•Ла§Ч</span>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="welcome-msg">
                рЯСЛ а§µа•За§≤а§Ха§Ѓ! а§ѓа§єа§Ња§Б а§Еа§™а§®а•З а§¶а•Ла§Єа•На§§а•Ла§В а§Єа•З а§ђа§Ња§§ а§Ха§∞а•За§В<br>
                рЯУЈ а§Ђа•Ла§Яа•Л а§≠а•За§Ь а§Єа§Ха§§а•З а§єа•Иа§В (10MB а§§а§Х) | рЯШК а§За§Ѓа•Ла§Ьа•А а§≠а•А а§єа•И
            </div>
        </div>
        
        <div class="input-area">
            <button id="emojiBtn" class="emoji-btn" title="а§За§Ѓа•Ла§Ьа•А">рЯШК</button>
            <input type="text" id="messageInput" placeholder="а§Яа§Ња§За§™ а§Ха§∞а•За§В..." autocomplete="off">
            <button id="imageBtn" class="image-btn" title="а§Ђа•Ла§Яа•Л а§≠а•За§Ьа•За§В (10MB а§§а§Х)">рЯУЈ</button>
            <button id="sendBtn" class="send-btn" title="а§≠а•За§Ьа•За§В">вЮ§</button>
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // а§Жа§™а§Ха§Њ Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCml0iKyB9IP_8hlRICNL5oul_REv6JZOc",
            authDomain: "whatsappchattingapp-2031b.firebaseapp.com",
            databaseURL: "https://whatsappchattingapp-2031b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "whatsappchattingapp-2031b",
            storageBucket: "whatsappchattingapp-2031b.firebasestorage.app",
            messagingSenderId: "588426238074",
            appId: "1:588426238074:web:9d20c5e269ec9cef7ec3c3"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const userName = localStorage.getItem('userName');
        const userPhone = localStorage.getItem('userPhone');
        
        if(!userName || !userPhone) {
            window.location.href = 'index.html';
        }
        
        // а§Са§®а§≤а§Ња§За§® а§Єа•На§Яа•За§Яа§Є
        const userStatusRef = ref(db, 'users/' + userPhone);
        const connectedRef = ref(db, '.info/connected');
        
        onValue(connectedRef, (snap) => {
            if(snap.val() === true) {
                update(userStatusRef, { online: true, lastSeen: new Date().toISOString() });
                window.addEventListener('beforeunload', () => {
                    update(userStatusRef, { online: false });
                });
            }
        });
        
        // а§Са§®а§≤а§Ња§За§® а§Ха§Ња§Йа§Ва§Я
        const usersRef = ref(db, 'users');
        onValue(usersRef, (snapshot) => {
            let online = 0;
            let onlineNames = [];
            snapshot.forEach((child) => {
                if(child.val().online === true) {
                    online++;
                    onlineNames.push(child.val().name);
                }
            });
            document.getElementById('onlineCount').innerHTML = online;
            if(onlineNames.length > 0) {
                document.querySelector('.online-users span').innerHTML = `рЯЯҐ а§Са§®а§≤а§Ња§За§®: ${online} а§≤а•Ла§Ч (${onlineNames.slice(0,5).join(', ')}${onlineNames.length > 5 ? '...' : ''})`;
            } else {
                document.querySelector('.online-users span').innerHTML = `рЯЯҐ а§Са§®а§≤а§Ња§За§®: 0 а§≤а•Ла§Ч`;
            }
        });
        
        const messagesRef = ref(db, 'messages');
        
        function sendMessage(text, isImage = false, imageBase64 = '') {
            if(!text && !isImage) return;
            
            const message = {
                text: text || (isImage ? 'рЯУЈ а§Ђа•Ла§Яа•Л' : ''),
                sender: userName,
                senderPhone: userPhone,
                timestamp: new Date().toISOString(),
                type: isImage ? 'image' : 'text'
            };
            if(isImage) message.imageBase64 = imageBase64;
            push(messagesRef, message);
        }
        
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('messageInput');
            if(input.value.trim()) {
                sendMessage(input.value.trim());
                input.value = '';
                input.focus();
            }
        });
        
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
        });
        
        // рЯУЈ а§Ђа•Ла§Яа•Л а§Еа§™а§≤а•Ла§° (Base64 - 10MB а§§а§Х)
        document.getElementById('imageBtn').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });
        
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            if(!file.type.startsWith('image/')) {
                alert("вЭМ а§Ха•Га§™а§ѓа§Њ а§Єа§ња§∞а•На§Ђ а§За§Ѓа•За§Ь а§Ђа§Ња§За§≤ а§Ъа•Ба§®а•За§В (JPG, PNG, GIF)");
                e.target.value = '';
                return;
            }
            
            // 10MB а§Ха•А limit
            if(file.size > 10 * 1024 * 1024) {
                alert("вЭМ а§Ђа•Ла§Яа•Л 10MB а§Єа•З а§Ыа•Ла§Яа•А а§єа•Ла§®а•А а§Ъа§Ња§єа§ња§П! а§Жа§™а§Ха•А а§Ђа•Ла§Яа•Л: " + (file.size / (1024 * 1024)).toFixed(2) + "MB");
                e.target.value = '';
                return;
            }
            
            // а§≤а•Ла§°а§ња§Ва§Ч а§¶а§ња§Ца§Ња§Па§В
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message message-sent';
            loadingDiv.innerHTML = `
                <div class="message-sender">${userName}</div>
                <div class="message-text">
                    вП≥ а§Ђа•Ла§Яа•Л а§Еа§™а§≤а•Ла§° а§єа•Л а§∞а§єа•А а§єа•И... (${(file.size / (1024 * 1024)).toFixed(2)}MB)
                    <span class="loading-spinner"></span>
                </div>
            `;
            document.getElementById('messagesArea').appendChild(loadingDiv);
            loadingDiv.scrollIntoView({ behavior: 'smooth' });
            
            // а§Ђа§Ња§За§≤ а§Ха•Л Base64 а§Ѓа•За§В а§ђа§¶а§≤а•За§В
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const base64Image = event.target.result;
                
                // а§≤а•Ла§°а§ња§Ва§Ч а§єа§Яа§Ња§Па§В
                loadingDiv.remove();
                
                // Base64 а§Єа§Ња§За§Ь а§Ъа•За§Х а§Ха§∞а•За§В (а§µа§Ња§∞а•На§®а§ња§Ва§Ч а§Ха•З а§≤а§ња§П)
                const base64Size = (base64Image.length * 0.75) / (1024 * 1024);
                if(base64Size > 12) {
                    console.warn("Base64 а§Єа§Ња§За§Ь а§ђа§°а§Ља§Њ а§єа•И: " + base64Size.toFixed(2) + "MB");
                }
                
                // а§Ѓа•Иа§Єа•За§Ь а§≠а•За§Ьа•За§В
                sendMessage('', true, base64Image);
                
                // а§Ыа•Ла§Яа•А а§Єа•Ва§Ъа§®а§Њ
                const toast = document.createElement('div');
                toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#25d366;color:black;padding:8px 16px;border-radius:20px;font-size:12px;z-index:1000;animation:fadeOut 2s forwards;';
                toast.innerHTML = 'вЬЕ а§Ђа•Ла§Яа•Л а§≠а•За§Ь а§¶а•А а§Ча§И!';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            };
            
            reader.onerror = function() {
                loadingDiv.remove();
                alert("вЭМ а§Ђа•Ла§Яа•Л а§™а§Ґа§Ља§®а•З а§Ѓа•За§В а§§а•На§∞а•Ба§Яа§њ! а§Ха•Га§™а§ѓа§Њ а§¶а•Ва§Єа§∞а•А а§Ђа•Ла§Яа•Л а§Ъа•Ба§®а•За§Ва•§");
            };
            
            reader.readAsDataURL(file);
            e.target.value = '';
        });
        
        // а§За§Ѓа•Ла§Ьа•А а§™а§ња§Ха§∞
        const emojis = ['рЯША','рЯШГ','рЯШД','рЯШБ','рЯШЖ','рЯШЕ','рЯШВ','рЯ§£','рЯШК','рЯШЗ','рЯЩВ','рЯЩГ','рЯШЙ','рЯШМ','рЯШН','рЯ•∞','рЯШШ','рЯШЧ','рЯШЩ','рЯШЪ','рЯШЛ','рЯШЫ','рЯШЭ','рЯШЬ','рЯ§™','рЯ§®','рЯІР','рЯ§У','рЯШО','рЯ•Є','рЯ§©','рЯ•≥','рЯШП','рЯШТ','рЯШЮ','рЯШФ','рЯШЯ','рЯШХ','рЯЩБ','вШєпЄП','рЯШ£','рЯШЦ','рЯШЂ','рЯШ©','рЯ•Ї','рЯШҐ','рЯШ≠','рЯШ§','рЯШ†','рЯШ°','рЯ§ђ','рЯ§ѓ','рЯШ≥','рЯ•µ','рЯ•ґ','рЯШ±','рЯШ®','рЯШ∞','рЯШ•','рЯШУ','рЯ§Ч','рЯ§Ф','рЯ§≠','рЯ§Ђ','рЯ§•','рЯШґ','рЯШР','рЯШС','рЯШђ','рЯЩД','рЯШѓ','рЯШ¶','рЯШІ','рЯШЃ','рЯШ≤','рЯ•±','рЯШі','рЯ§§','рЯШ™','рЯШµ','рЯ§Р','рЯ•і','рЯ§Ґ','рЯ§Ѓ','рЯ§І','рЯШЈ','рЯ§Т','рЯ§Х','рЯ§С','рЯ§†','рЯШИ','рЯСњ','рЯСє','рЯСЇ','рЯ§°','рЯТ©','рЯСї','рЯТА','рЯСљ','рЯ§Ц','рЯОГ','вЭ§пЄП','рЯТХ','рЯТЮ','рЯТУ','рЯТЧ','рЯТЦ','рЯТШ','рЯТЭ','рЯОЙ','вЬ®','в≠Р','рЯМЯ','рЯТ•','рЯФ•','рЯТѓ'];
        
        let emojiPickerOpen = false;
        
        document.getElementById('emojiBtn').addEventListener('click', () => {
            if(emojiPickerOpen) {
                const picker = document.getElementById('emojiPicker');
                if(picker) picker.remove();
                emojiPickerOpen = false;
                return;
            }
            
            const picker = document.createElement('div');
            picker.id = 'emojiPicker';
            picker.style.cssText = 'position:fixed;bottom:80px;left:10px;background:#2d2d2d;border:1px solid #075e54;border-radius:15px;padding:12px;width:280px;max-height:250px;overflow-y:auto;display:grid;grid-template-columns:repeat(8,1fr);gap:6px;z-index:1000;box-shadow:0 4px 15px rgba(0,0,0,0.3);';
            
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.style.cssText = 'font-size:26px;border:none;background:transparent;cursor:pointer;padding:6px;border-radius:8px;transition:all 0.2s;';
                btn.onmouseenter = () => btn.style.background = '#075e54';
                btn.onmouseleave = () => btn.style.background = 'transparent';
                btn.onclick = () => {
                    document.getElementById('messageInput').value += emoji;
                    document.getElementById('messageInput').focus();
                    picker.remove();
                    emojiPickerOpen = false;
                };
                picker.appendChild(btn);
            });
            
            document.body.appendChild(picker);
            emojiPickerOpen = true;
            
            setTimeout(() => {
                document.addEventListener('click', function closePicker(e) {
                    if(!picker.contains(e.target) && e.target !== document.getElementById('emojiBtn')) {
                        picker.remove();
                        emojiPickerOpen = false;
                        document.removeEventListener('click', closePicker);
                    }
                });
            }, 10);
        });
        
        // а§Ѓа•Иа§Єа•За§Ь а§¶а§ња§Ца§Ња§®а§Њ (Base64 а§За§Ѓа•За§Ь а§Ха•З а§Єа§Ња§•)
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const messagesDiv = document.getElementById('messagesArea');
            const isMe = msg.senderPhone === userPhone;
            
            const welcome = messagesDiv.querySelector('.welcome-msg');
            if(welcome && messagesDiv.children.length > 1) welcome.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'message-sent' : 'message-received'}`;
            const time = new Date(msg.timestamp).toLocaleTimeString('hi-IN', {hour:'2-digit', minute:'2-digit'});
            
            if(msg.type === 'image') {
                // Base64 а§За§Ѓа•За§Ь а§¶а§ња§Ца§Ња§Па§В
                const imageSrc = msg.imageBase64 || msg.imageUrl;
                msgDiv.innerHTML = `
                    <div class="message-sender">${escapeHtml(msg.sender)}</div>
                    <img src="${imageSrc}" class="message-image" onclick="window.open(this.src)" alt="а§Ђа•Ла§Яа•Л" loading="lazy">
                    <div class="message-time">${time}</div>
                `;
            } else {
                msgDiv.innerHTML = `
                    <div class="message-sender">${escapeHtml(msg.sender)}</div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${time}</div>
                `;
            }
            
            messagesDiv.appendChild(msgDiv);
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // а§≤а•Йа§Ча§Жа§Йа§Я
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await update(userStatusRef, { online: false });
            localStorage.clear();
            window.location.href = 'index.html';
        });
        
        // CSS animation а§Ха•З а§≤а§ња§П style а§Ьа•Ла§°а§Ља•За§В
        const style = document.createElement('style');
        style.textContent = `
            .loading-spinner {
                display: inline-block;
                width: 14px;
                height: 14px;
                border: 2px solid #fff;
                border-radius: 50%;
                border-top-color: transparent;
                animation: spin 0.6s linear infinite;
                margin-left: 8px;
                vertical-align: middle;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            @keyframes fadeOut {
                0% { opacity: 1; }
                70% { opacity: 1; }
                100% { opacity: 0; visibility: hidden; }
            }
            .message-image {
                max-width: 200px;
                max-height: 200px;
                border-radius: 12px;
                margin-top: 5px;
                cursor: pointer;
                object-fit: cover;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
