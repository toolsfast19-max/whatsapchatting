<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>चैट - मेरी चैट</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <span>👥</span>
                <h3>ग्रुप चैट</h3>
            </div>
            <button id="logoutBtn" class="logout-btn">🚪 बाहर निकलें</button>
        </div>
        
        <div class="online-users">
            <span>🟢 ऑनलाइन: <span id="onlineCount">0</span> लोग</span>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="welcome-msg">
                👋 वेलकम! यहाँ अपने दोस्तों से बात करें<br>
                📷 फोटो भेज सकते हैं (10MB तक) | 😊 इमोजी भी है
            </div>
        </div>
        
        <div class="input-area">
            <button id="emojiBtn" class="emoji-btn" title="इमोजी">😊</button>
            <input type="text" id="messageInput" placeholder="टाइप करें..." autocomplete="off">
            <button id="imageBtn" class="image-btn" title="फोटो भेजें (10MB तक)">📷</button>
            <button id="sendBtn" class="send-btn" title="भेजें">➤</button>
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // आपका Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCml0iKyB9IP_8hlRICNL5oul_REv6JZOc",
            authDomain: "whatsappchattingapp-2031b.firebaseapp.com",
            databaseURL: "https://whatsappchattingapp-2031b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "whatsappchattingapp-2031b",
            storageBucket: "whatsappchattingapp-2031b.firebasestorage.app",
            messagingSenderId: "588426238074",
            appId: "1:588426238074:web:9d20c5e269ec9cef7ec3c3"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const userName = localStorage.getItem('userName');
        const userPhone = localStorage.getItem('userPhone');
        
        if(!userName || !userPhone) {
            window.location.href = 'index.html';
        }
        
        // ऑनलाइन स्टेटस
        const userStatusRef = ref(db, 'users/' + userPhone);
        const connectedRef = ref(db, '.info/connected');
        
        onValue(connectedRef, (snap) => {
            if(snap.val() === true) {
                update(userStatusRef, { online: true, lastSeen: new Date().toISOString() });
                window.addEventListener('beforeunload', () => {
                    update(userStatusRef, { online: false });
                });
            }
        });
        
        // ऑनलाइन काउंट
        const usersRef = ref(db, 'users');
        onValue(usersRef, (snapshot) => {
            let online = 0;
            let onlineNames = [];
            snapshot.forEach((child) => {
                if(child.val().online === true) {
                    online++;
                    onlineNames.push(child.val().name);
                }
            });
            document.getElementById('onlineCount').innerHTML = online;
            if(onlineNames.length > 0) {
                document.querySelector('.online-users span').innerHTML = `🟢 ऑनलाइन: ${online} लोग (${onlineNames.slice(0,5).join(', ')}${onlineNames.length > 5 ? '...' : ''})`;
            } else {
                document.querySelector('.online-users span').innerHTML = `🟢 ऑनलाइन: 0 लोग`;
            }
        });
        
        const messagesRef = ref(db, 'messages');
        
        function sendMessage(text, isImage = false, imageBase64 = '') {
            if(!text && !isImage) return;
            
            const message = {
                text: text || (isImage ? '📷 फोटो' : ''),
                sender: userName,
                senderPhone: userPhone,
                timestamp: new Date().toISOString(),
                type: isImage ? 'image' : 'text'
            };
            if(isImage) message.imageBase64 = imageBase64;
            push(messagesRef, message);
        }
        
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('messageInput');
            if(input.value.trim()) {
                sendMessage(input.value.trim());
                input.value = '';
                input.focus();
            }
        });
        
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
        });
        
        // 📷 फोटो अपलोड (Base64 - 10MB तक)
        document.getElementById('imageBtn').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });
        
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            if(!file.type.startsWith('image/')) {
                alert("❌ कृपया सिर्फ इमेज फाइल चुनें (JPG, PNG, GIF)");
                e.target.value = '';
                return;
            }
            
            // 10MB की limit
            if(file.size > 10 * 1024 * 1024) {
                alert("❌ फोटो 10MB से छोटी होनी चाहिए! आपकी फोटो: " + (file.size / (1024 * 1024)).toFixed(2) + "MB");
                e.target.value = '';
                return;
            }
            
            // लोडिंग दिखाएं
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message message-sent';
            loadingDiv.innerHTML = `
                <div class="message-sender">${userName}</div>
                <div class="message-text">
                    ⏳ फोटो अपलोड हो रही है... (${(file.size / (1024 * 1024)).toFixed(2)}MB)
                    <span class="loading-spinner"></span>
                </div>
            `;
            document.getElementById('messagesArea').appendChild(loadingDiv);
            loadingDiv.scrollIntoView({ behavior: 'smooth' });
            
            // फाइल को Base64 में बदलें
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const base64Image = event.target.result;
                loadingDiv.remove();
                sendMessage('', true, base64Image);
                
                // छोटी सूचना
                const toast = document.createElement('div');
                toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#25d366;color:black;padding:8px 16px;border-radius:20px;font-size:12px;z-index:1000;animation:fadeOut 2s forwards;';
                toast.innerHTML = '✅ फोटो भेज दी गई!';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            };
            
            reader.onerror = function() {
                loadingDiv.remove();
                alert("❌ फोटो पढ़ने में त्रुटि! कृपया दूसरी फोटो चुनें।");
            };
            
            reader.readAsDataURL(file);
            e.target.value = '';
        });
        
        // इमोजी पिकर
        const emojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🥸','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠','😈','👿','👹','👺','🤡','💩','👻','💀','👽','🤖','🎃','❤️','💕','💞','💓','💗','💖','💘','💝','🎉','✨','⭐','🌟','💥','🔥','💯'];
        
        let emojiPickerOpen = false;
        
        document.getElementById('emojiBtn').addEventListener('click', () => {
            if(emojiPickerOpen) {
                const picker = document.getElementById('emojiPicker');
                if(picker) picker.remove();
                emojiPickerOpen = false;
                return;
            }
            
            const picker = document.createElement('div');
            picker.id = 'emojiPicker';
            picker.style.cssText = 'position:fixed;bottom:80px;left:10px;background:#2d2d2d;border:1px solid #075e54;border-radius:15px;padding:12px;width:280px;max-height:250px;overflow-y:auto;display:grid;grid-template-columns:repeat(8,1fr);gap:6px;z-index:1000;box-shadow:0 4px 15px rgba(0,0,0,0.3);';
            
            emojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.style.cssText = 'font-size:26px;border:none;background:transparent;cursor:pointer;padding:6px;border-radius:8px;transition:all 0.2s;';
                btn.onmouseenter = () => btn.style.background = '#075e54';
                btn.onmouseleave = () => btn.style.background = 'transparent';
                btn.onclick = () => {
                    document.getElementById('messageInput').value += emoji;
                    document.getElementById('messageInput').focus();
                    picker.remove();
                    emojiPickerOpen = false;
                };
                picker.appendChild(btn);
            });
            
            document.body.appendChild(picker);
            emojiPickerOpen = true;
            
            setTimeout(() => {
                document.addEventListener('click', function closePicker(e) {
                    if(!picker.contains(e.target) && e.target !== document.getElementById('emojiBtn')) {
                        picker.remove();
                        emojiPickerOpen = false;
                        document.removeEventListener('click', closePicker);
                    }
                });
            }, 10);
        });
        
        // मैसेज दिखाना (Base64 इमेज के साथ)
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const messagesDiv = document.getElementById('messagesArea');
            const isMe = msg.senderPhone === userPhone;
            
            const welcome = messagesDiv.querySelector('.welcome-msg');
            if(welcome && messagesDiv.children.length > 1) welcome.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMe ? 'message-sent' : 'message-received'}`;
            const time = new Date(msg.timestamp).toLocaleTimeString('hi-IN', {hour:'2-digit', minute:'2-digit'});
            
            if(msg.type === 'image') {
                const imageSrc = msg.imageBase64;
                msgDiv.innerHTML = `
                    <div class="message-sender">${escapeHtml(msg.sender)}</div>
                    <img src="${imageSrc}" class="message-image" onclick="window.open(this.src)" alt="फोटो" loading="lazy">
                    <div class="message-time">${time}</div>
                `;
            } else {
                msgDiv.innerHTML = `
                    <div class="message-sender">${escapeHtml(msg.sender)}</div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${time}</div>
                `;
            }
            
            messagesDiv.appendChild(msgDiv);
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        });
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // लॉगआउट
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await update(userStatusRef, { online: false });
            localStorage.clear();
            window.location.href = 'index.html';
        });
        
        // CSS animation के लिए style जोड़ें
        const style = document.createElement('style');
        style.textContent = `
            .loading-spinner {
                display: inline-block;
                width: 14px;
                height: 14px;
                border: 2px solid #fff;
                border-radius: 50%;
                border-top-color: transparent;
                animation: spin 0.6s linear infinite;
                margin-left: 8px;
                vertical-align: middle;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            @keyframes fadeOut {
                0% { opacity: 1; }
                70% { opacity: 1; }
                100% { opacity: 0; visibility: hidden; }
            }
            .message-image {
                max-width: 200px;
                max-height: 200px;
                border-radius: 12px;
                margin-top: 5px;
                cursor: pointer;
                object-fit: cover;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
